scenarios:
  - id: "empty_straight"
    map_image: "maps/empty_world.png"
    resolution: 0.05
    origin: [-5.0, -5.0]
    robot_radius: 0.3
    start: [-3.0, -3.0]
    goal: [3.0, 3.0]
    reference_path:
      - [-3.0, -3.0]
      - [-1.5, -1.5]
      - [0.0, 0.0]
      - [1.5, 1.5]
      - [3.0, 3.0]
  
  - id: "scattered_rocks_detour"
    map_image: "maps/scattered_rocks.png"
    resolution: 0.05
    origin: [-5.0, -5.0]
    robot_radius: 0.3
    start: [-4.0, -4.0]
    goal: [4.0, 4.0]
    reference_path:
      - [-4.0, -4.0]
      - [-2.5, -1.5]
      - [-1.0, 1.0]
      - [1.0, 2.5]
      - [4.0, 4.0]
    dynamic_obstacles:
      - trigger_time: 0.5
        x: 1.0
        y: 2.5
        radius: 0.4

